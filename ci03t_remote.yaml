uart:
  - id: ci_03t
    tx_pin: 4
    rx_pin: 5
    baud_rate: 115200
    debug:
      direction: RX
      dummy_receiver: true
      after:
        delimiter: "\r\n"
      sequence:
        - lambda: |-
            UARTDebug::log_string(direction, bytes);  //Still log the data
            
            int sensorID=0;
            float sensorTEMP=0; 
            
            //Example to convert uart text to string
            std::string str(bytes.begin(), bytes.end());

            //watch for potential problems with non printable or special characters in string
            id(rawString).publish_state(str.c_str());

text_sensor:
  - platform: template
    name: "设备运行时间"
    icon: "mdi:clock-start"
    update_interval: 60s
    lambda: |-
      int total_seconds = (int)id(uptime_seconds).state;
      int days = total_seconds / 86400;
      int hours = (total_seconds % 86400) / 3600;
      int minutes = (total_seconds % 3600) / 60;
      int seconds = total_seconds % 60;
      return str_snprintf("%d天 %d小时 %d分 %d秒", 32, days, hours, minutes, seconds);

  - platform: template
    name: "Raw String"
    icon: "mdi:text-box-outline"
    id: "rawString"
    on_value:
      then:
        - if:
            condition:
              #检查手动设置空调时自动化应该打开的开关  
              #如果为打开就是手动设置 应该在then关闭这个开关并输出结束的日志
              #如果为关闭就是语音触发 应该在else设置空调的状态
              - switch.is_on: climate_sw
            then:  #进入then为手动设置空调
              - logger.log: "text_sensor报告  手动设置空调后进入then分支   00000000000000000000000000000000000 start  "
              - logger.log: "text_sensor报告  climate_sw状态为打开 不需要设置climate 00000000000000000000000000000000000 "  
              - switch.turn_off: climate_sw
              - logger.log: "text_sensor报告  climate_sw已经关闭 00000000000000000000000000000000000 "  
              - logger.log: "text_sensor报告  climate的手动设置空调到这里应该结束了 00000000000000000000000000000000000"  
              - logger.log: "text_sensor报告  then分支 00000000000000000000000000000000000  end "  
                
            else:  #进入else为语音触发
              - logger.log: "text_sensor报告  语音触发后进入else分支  11111111111111111111111   start "  
                
              # - switch.turn_on: text_sw
              # - wait_until:
              #     - switch.is_on: text_sw
              - lambda: |-
                  std::string str = x;
                  
                  // 1. 严格清洗非打印字符与异常不可见字符（彻底解决 bad UTF-8 造成的 API 闪退及 WDT 崩溃）
                  std::string safe_str = "";
                  for (char c : str) {
                    // 只允许可见的 ASCII 字符 (32 到 126) 以及标准的换行和制表符。
                    // 任何由于杜邦线抖动产生的类似 \x97 \x95 \xbd 等断帧高位脏字节会被在这里彻底过滤掉。
                    if ((c >= 32 && c <= 126) || c == '\n' || c == '\r' || c == '\t') {
                      safe_str += c;
                    }
                  }
                  str = safe_str;
                  if (str.empty()) return;
      
                  // 2. 清除整行字符串前后的空格（加入严格的边界校验）
                  size_t first_not_of = str.find_first_not_of(" \t\r\n");
                  if (first_not_of == std::string::npos) return; 
                  str.erase(0, first_not_of);
                  
                  size_t last_not_of = str.find_last_not_of(" \t\r\n");
                  if (last_not_of != std::string::npos) {
                    str.erase(last_not_of + 1);
                  }
                  
                  // 3. 找到 "+" 号的位置
                  size_t pos = str.find("+");
                  // 防御：如果找不到 '+'，或者 '+' 在第一位或最后一位，说明这不是空调控制指令。
                  // 直接安全退出本次 lambda，确保其他非空调数据能够顺利流过。
                  if (pos == std::string::npos || pos == 0 || pos >= str.length() - 1) return; 
                  
                  // 4. 安全提取加号前面的“命令” (cmd)，并去掉前后空格
                  std::string cmd = str.substr(0, pos);
                  size_t cmd_first = cmd.find_first_not_of(" \t\r\n");
                  if (cmd_first != std::string::npos) {
                    cmd.erase(0, cmd_first);
                    size_t cmd_last = cmd.find_last_not_of(" \t\r\n");
                    if (cmd_last != std::string::npos) cmd.erase(cmd_last + 1);
                  }
      
                  // 5. 安全提取加号后面的“参数” (val)，并去掉前后空格
                  std::string val = str.substr(pos + 1);
                  size_t val_first = val.find_first_not_of(" \t\r\n");
                  if (val_first != std::string::npos) {
                    val.erase(0, val_first);
                    size_t val_last = val.find_last_not_of(" \t\r\n");
                    if (val_last != std::string::npos) val.erase(val_last + 1);
                  }
                  
                  // 如果提取出来的 cmd 或 val 为空，安全退出
                  if (cmd.empty() || val.empty()) return;

                  // 【新增逻辑】：在 make_call 之前，先拦截判断 cmd 是不是这 6 个空调核心关键字之一
                  if (cmd == "mode/state" || 
                      cmd == "temperature/state" || 
                      cmd == "fan/state" || 
                      cmd == "preset_mode/state" || 
                      cmd == "swing/state" || 
                      cmd == "swingH/state") {
                    
                    // 1. 确认是空调指令，立刻打开开关
                    id(text_sw).turn_on();
                    // 2. 强行刷新底层事件，确保开关状态先一步在内存和硬件中生效，绝不被后续控制阻塞
                    App.feed_wdt(); 
                  }

                  // 创建空调控制请求
                  auto call = id(my_climate).make_call();
                  bool is_valid_action = false; 
                  
                  // --- 1. 处理模式 (mode/state) ---
                  if (cmd == "mode/state") {
                    if (val == "cool") { call.set_mode("COOL"); is_valid_action = true; }
                    else if (val == "heat") { call.set_mode("HEAT"); is_valid_action = true; }
                    else if (val == "off") { call.set_mode("OFF"); is_valid_action = true; }
                    else if (val == "auto") { call.set_mode("AUTO"); is_valid_action = true; }
                    else if (val == "fan_only") { call.set_mode("FAN_ONLY"); is_valid_action = true; }
                    else if (val == "dry") { call.set_mode("DRY"); is_valid_action = true; }
                  }
                  
                  // --- 2. 处理温度 (temperature/state) ---
                  else if (cmd == "temperature/state") {
                    float temp = ::atof(val.c_str()); 
                    if (temp >= 16.0 && temp <= 32.0) { 
                      call.set_target_temperature(temp);
                      is_valid_action = true;
                    }
                  }
                  
                  // --- 3. 处理风速 (fan/state) ---
                  else if (cmd == "fan/state") {
                    if (val == "low") { call.set_fan_mode("LOW"); is_valid_action = true; }
                    else if (val == "medium") { call.set_fan_mode("MEDIUM"); is_valid_action = true; }
                    else if (val == "high") { call.set_fan_mode("HIGH"); is_valid_action = true; }
                    else if (val == "auto") { call.set_fan_mode("AUTO"); is_valid_action = true; }
                  }
                  
                  // --- 4. 处理预设模式 (preset_mode/state) ---
                  else if (cmd == "preset_mode/state") {
                    if (val == "sleep") { call.set_preset("SLEEP"); is_valid_action = true; }
                    else if (val == "eco") { call.set_preset("ECO"); is_valid_action = true; }
                    else if (val == "away") { call.set_preset("AWAY"); is_valid_action = true; }
                    else if (val == "boost") { call.set_preset("BOOST"); is_valid_action = true; }
                    else if (val == "none") { call.set_preset("NONE"); is_valid_action = true; }
                  }
                  
                  // --- 5. 扫风控制 ---
                  else if (cmd == "swing/state" || cmd == "swingH/state") {
                    auto current_swing = id(my_climate).swing_mode;
                    is_valid_action = true;
                    
                    if (cmd == "swing/state") {
                      if (val == "on") {
                        if (current_swing == climate::CLIMATE_SWING_HORIZONTAL) call.set_swing_mode("BOTH");
                        else call.set_swing_mode("VERTICAL");
                      } else if (val == "off") {
                        if (current_swing == climate::CLIMATE_SWING_BOTH) call.set_swing_mode("HORIZONTAL");
                        else call.set_swing_mode("OFF");
                      }
                    }
                    
                    else if (cmd == "swingH/state") {
                      if (val == "on") {
                        if (current_swing == climate::CLIMATE_SWING_VERTICAL) call.set_swing_mode("BOTH");
                        else call.set_swing_mode("HORIZONTAL");
                      } else if (val == "off") {
                        if (current_swing == climate::CLIMATE_SWING_BOTH) call.set_swing_mode("VERTICAL");
                        else call.set_swing_mode("OFF");
                      }
                    }
                  }
                  
                  // 最终提交执行所有变更
                  if (is_valid_action) {
                    call.perform();
                  }
              - logger.log: "text_sensor报告  else分支的语音设置到这里应该结束了 11111111111111111111111  end"

                


climate:
  - platform: gree
    name: "AC"
    id: my_climate
    model: yx1ff
    on_state:
        - if:
            condition:
              #检查text设置空调时自动化应该打开的开关  
              #如果为打开就是语音触发  应该在then关闭这个开关并输出结束的日志
              #如果为关闭就是手动设置  应该在else设置空调的状态
              - switch.is_on: text_sw
            then:  #进入then 为语音触发
              - logger.log: "climate报告  语音触发后进入then分支  22222222222222222222222  start "  
              - logger.log: "climate报告  text_sw状态为打开 只设置空调 不需要触发按键 22222222222222222222222  "  
              - switch.turn_off: text_sw
              - logger.log: "climate报告  text_sw已经关闭 22222222222222222222222  "  
              - logger.log: "climate报告  text_sensor的触发设置到这里应该结束了 22222222222222222222222   "  
              - logger.log: "climate报告  then分支语音触发结束 22222222222222222222222   end "  
            else:  #进入else 为手动触发 需要触发按键
              - switch.turn_on: climate_sw
              - if:
                  condition:
                    - switch.is_on: climate_sw
                  then:
                    - logger.log: "climate报告  climate_sw打开了 " 
                  else:
                    - logger.log: "climate报告  climate_sw未打开 " 
              - logger.log: "climate报告  手动触发进入else分支  需要触发按键 33333333333333333333333333333    start "  
              - lambda: |-
                  // ================= 0. 初始化历史状态记录变量 =================
                  static climate::ClimateMode last_mode = climate::CLIMATE_MODE_OFF;
                  static optional<climate::ClimateFanMode> last_fan_mode;
                  static climate::ClimateSwingMode last_swing_mode = climate::CLIMATE_SWING_OFF;
                  static int last_target_temp = 0;
        
                  // ================= 1. 开关机控制 =================
                  if (x.mode == CLIMATE_MODE_OFF) {
                    if (last_mode != CLIMATE_MODE_OFF) { 
                      id(press_with_delay).execute(id(ac_off));
                      last_mode = x.mode;
                    }
                    return; 
                  }
        
                  // ================= 2. 模式控制 (Mode) =================
                  if (x.mode != last_mode) {
                    switch(x.mode) {
                      case CLIMATE_MODE_HEAT_COOL: id(press_with_delay).execute(id(ac_auto_mode)); break;
                      case CLIMATE_MODE_COOL: id(press_with_delay).execute(id(ac_cool_mode)); break;
                      case CLIMATE_MODE_HEAT: id(press_with_delay).execute(id(ac_heat_mode)); break;
                      case CLIMATE_MODE_DRY: id(press_with_delay).execute(id(ac_dry_mode)); break;
                      case CLIMATE_MODE_FAN_ONLY: id(press_with_delay).execute(id(ac_supply_mode)); break;
                      default: break;
                    }
                  }
                  last_mode = x.mode; 
        
                  // ================= 3. 风速控制 (Fan Mode) =================
                  if (x.fan_mode.has_value()) {
                    if (!last_fan_mode.has_value() || x.fan_mode.value() != last_fan_mode.value()) {
                      switch(x.fan_mode.value()) {
                        case CLIMATE_FAN_LOW: id(press_with_delay).execute(id(ac_fan_low)); break;
                        case CLIMATE_FAN_MEDIUM: id(press_with_delay).execute(id(ac_fan_midium)); break;
                        case CLIMATE_FAN_HIGH: id(press_with_delay).execute(id(ac_fan_high)); break;
                        case CLIMATE_FAN_AUTO: id(press_with_delay).execute(id(ac_fan_auto)); break;
                        default: break;
                      }
                    }
                  }
                  last_fan_mode = x.fan_mode;
        
                  // ================= 4. 扫风控制 (Swing Mode) =================
                  if (x.swing_mode != last_swing_mode) {
                    if (x.swing_mode == CLIMATE_SWING_VERTICAL) {
                      id(press_with_delay).execute(id(ac_swing));
                    } 
                    else if (x.swing_mode == CLIMATE_SWING_HORIZONTAL) {
                      id(press_with_delay).execute(id(ac_swingh));
                    } 
                    else if (x.swing_mode == CLIMATE_SWING_BOTH) {
                      id(press_with_delay).execute(id(ac_swing));
                      id(press_with_delay).execute(id(ac_swingh));
                    } 
                    else if (x.swing_mode == CLIMATE_SWING_OFF) {
                      id(press_with_delay).execute(id(ac_swing_stop));
                      id(press_with_delay).execute(id(ac_swingh_stop));
                    }
                  }
                  last_swing_mode = x.swing_mode;
        
                  // ================= 5. 温度控制 (Target Temperature) =================
                  int target_temp = (int)x.target_temperature; 
                  
                  if (target_temp != last_target_temp) {
                    switch(target_temp) {
                      case 16: id(press_with_delay).execute(id(ac_16)); break;
                      case 17: id(press_with_delay).execute(id(ac_17)); break;
                      case 18: id(press_with_delay).execute(id(ac_18)); break;
                      case 19: id(press_with_delay).execute(id(ac_19)); break;
                      case 20: id(press_with_delay).execute(id(ac_20)); break;
                      case 21: id(press_with_delay).execute(id(ac_21)); break;
                      case 22: id(press_with_delay).execute(id(ac_22)); break;
                      case 23: id(press_with_delay).execute(id(ac_23)); break;
                      case 24: id(press_with_delay).execute(id(ac_24)); break;
                      case 25: id(press_with_delay).execute(id(ac_25)); break;
                      case 26: id(press_with_delay).execute(id(ac_26)); break;
                      case 27: id(press_with_delay).execute(id(ac_27)); break;
                      case 28: id(press_with_delay).execute(id(ac_28)); break;
                      case 29: id(press_with_delay).execute(id(ac_29)); break;
                      case 30: id(press_with_delay).execute(id(ac_30)); break;
                      default: break;
                    }
                  }
                  last_target_temp = target_temp;
              - logger.log: "climate报告  else分支手动触发 结束 33333333333333333333333333333   end "  

                  
